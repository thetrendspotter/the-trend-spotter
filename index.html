<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Trend Spotter | Viral Pinterest Finds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-custom {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(217, 140, 95, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(217, 140, 95, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(217, 140, 95, 0); }
        }
        .majboor-btn { animation: pulse-custom 2s infinite; }
    </style>
</head>
<body class="bg-[#F8FAFA] font-sans">

    <header class="bg-[#0D3B3F] p-5 border-b-4 border-[#D98C5F] sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-[#D98C5F] text-xl font-black italic uppercase tracking-tighter">The Trend Spotter</h1>
        <div class="bg-red-600 text-white text-[10px] px-3 py-1 rounded-full font-bold animate-pulse">
            LIVE: 14 VIEWERS
        </div>
    </header>

    <section class="bg-[#0D3B3F] py-16 px-6 text-center text-white">
        <h2 class="text-4xl font-extrabold mb-4 leading-tight">Internet's <span class="text-[#D98C5F]">Most Viral</span> Products</h2>
        <p class="text-white/70 text-sm italic">We find the trends. You get the secret deals.</p>
    </section>

    <main class="max-w-md mx-auto p-6 space-y-10">
        
        <div class="bg-white rounded-[40px] shadow-2xl overflow-hidden border border-gray-100 transition-all">
            <div class="relative h-80 bg-gray-200">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover">
                <div class="absolute top-4 left-4 bg-[#0D3B3F] text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase">Top Trending</div>
            </div>
            <div class="p-8 text-center">
                <h3 class="text-[#0D3B3F] text-2xl font-black mb-3 uppercase italic">Aesthetic Viral Watch</h3>
                <p class="text-gray-500 text-sm mb-8 leading-relaxed">Seen on Pinterest & TikTok. Limited stock available at secret price.</p>
                
                <a href="#" class="majboor-btn block w-full bg-[#D98C5F] text-white py-5 rounded-2xl font-black text-lg uppercase tracking-widest shadow-lg">
                    REVEAL SECRET DEAL
                </a>
            </div>
        </div>

    </main>

    <footer class="text-center py-10 text-gray-400 text-[10px] uppercase tracking-widest">
        &copy; 2026 The Trend Spotter • Private Affiliate Network
    </footer>

</body>
</html>
